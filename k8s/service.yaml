apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: openclaw
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      protocol: TCP
      name: gateway
    - port: 18790
      targetPort: 18790
      protocol: TCP
      name: bridge
  selector:
    app: openclaw
---
apiVersion: v1
kind: Service
metadata:
  name: squid
  namespace: openclaw
spec:
  type: ClusterIP
  ports:
    - port: 3128
      targetPort: 3128
      protocol: TCP
      name: proxy
  selector:
    app: openclaw
