apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
  labels:
    app: openclaw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openclaw
          image: openclaw:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18789
              name: gateway
            - containerPort: 18790
              name: bridge
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "opencode-agent-secret-token"
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: discord-bot-token
            - name: DISCORD_APPLICATION_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: discord-application-id
            - name: HTTP_PROXY
              value: "http://squid:3128"
            - name: HTTPS_PROXY
              value: "http://squid:3128"
            - name: NO_PROXY
              value: "127.0.0.1,localhost,*.cluster.local"
          envFrom:
            - configMapRef:
                name: openclaw-config
            - secretRef:
                name: openclaw-secrets
          volumeMounts:
            - name: workspace
              mountPath: /data/workspace
            - name: openclaw-data
              mountPath: /data/openclaw
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10
        - name: squid
          image: sameersbn/squid:3.5.27-2
          ports:
            - containerPort: 3128
              name: proxy
          resources:
            requests:
              cpu: "0.5"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: squid-config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-workspace
        - name: openclaw-data
          emptyDir: {}
        - name: squid-config
          configMap:
            name: openclaw-config
            items:
              - key: squid.conf
                path: squid.conf
