apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "app": {
        "name": "openclaw",
        "version": "1.0.0"
      },
      "llm": {
        "provider": "opencode",
        "model": "opencode/minimax-m2.5-free"
      },
      "messaging": {
        "discord": {
          "enabled": true,
          "botToken": "${DISCORD_BOT_TOKEN}",
          "applicationId": "${DISCORD_APPLICATION_ID}",
          "channels": {
            "main": "opencode-agent",
            "logs": "opencode-logs",
            "sandbox": "opencode-sandbox"
          }
        }
      },
      "acp": {
        "enabled": true,
        "defaultAgent": "coder"
      },
      "agents": {
        "coder": {
          "backend": "opencode",
          "configFile": "/config/opencode-coder.json"
        },
        "judge": {
          "backend": "opencode",
          "configFile": "/config/opencode-judge.json"
        }
      },
      "storage": {
        "workspace": "/data/workspace",
        "data": "/data/openclaw"
      }
    }

  opencode-coder.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "opencode/minimax-m2.5-free",
      "permission": {
        "task": {
          "*": "allow"
        },
        "bash": {
          "workspace/*": "allow",
          "/data/workspace/*": "allow",
          "*": "deny"
        },
        "write": {
          "workspace/*": "allow",
          "/data/workspace/*": "allow",
          "*": "deny"
        },
        "read": {
          "workspace/**": "allow",
          "/data/workspace/**": "allow",
          ".opencode/**": "allow"
        }
      },
      "agent": {
        "coder": {
          "description": "Primary coding agent with safety validation",
          "mode": "primary",
          "model": "opencode/minimax-m2.5-free",
          "tools": {
            "read": true,
            "write": true,
            "edit": true,
            "bash": true,
            "task": true
          }
        }
      }
    }

  opencode-judge.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "opencode/minimax-m2.5-free",
      "permission": {
        "task": {
          "*": "deny"
        },
        "bash": {
          "*": "deny"
        },
        "write": {
          "*": "deny"
        },
        "read": {
          "workspace/**": "allow",
          "/data/workspace/**": "allow"
        }
      },
      "agent": {
        "judge": {
          "description": "Safety judge - validates actions before execution",
          "mode": "subagent",
          "model": "opencode/minimax-m2.5-free",
          "temperature": 0.1,
          "task_budget": 20,
          "tools": {
            "read": true,
            "write": false,
            "edit": false,
            "bash": false,
            "task": false
          }
        }
      }
    }
