version: '3.8'

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw:local
    container_name: openclaw
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - openclaw-data:/data
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          pids: 100
        reservations:
          memory: 2G
          cpus: '1.0'

volumes:
  openclaw-data:
    driver: local