# Squid Proxy Configuration

# ACL for allowed domains (via environment)
acl allowed_domains dstdomain api.duckduckgo.com
acl allowed_domains dstdomain serpapi.com
acl allowed_domains dstdomain exa.ai
acl allowed_domains dstdomain api.github.com
acl allowed_domains dstdomain docs.github.com

# ACL for blocked networks
acl blocked_subnets src 10.0.0.0/8
acl blocked_subnets src 172.16.0.0/12
acl blocked_subnets src 192.168.0.0/16
acl blocked_subnets src 169.254.169.254/32
acl blocked_subnets src 127.0.0.0/8

# HTTP port
http_port 3128

# Deny access to blocked subnets
http_access deny blocked_subnets

# Allow only allowed domains (comment out to allow all for testing)
# http_access allow allowed_domains
# http_access deny all

# Allow all for now (can restrict later)
http_access allow all

# Logging
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Cache configuration
cache_dir ufs /var/spool/squid 100 16 256
maximum_object_size 512 MB
cache_mem 256 MB

# Forward to origin
forwarded_for off
via off

# Security
header_access X-Forwarded-For deny all
header_access Via deny all
